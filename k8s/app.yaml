# Конфиг основного приложения: Deployment для бота и Service для доступа к HTTP endpoint.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${K8S_DEPLOYMENT_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${K8S_APP_NAME}
  template:
    metadata:
      labels:
        app: ${K8S_APP_NAME}
    spec:
      # Не даём Kubernetes автоматически подмешивать env-переменные сервисов в контейнеры.
      # Это избавляет от конфликтов имен.
      enableServiceLinks: false
      initContainers:
        # Сначала убеждаемся, что MongoDB уже принимает соединения.
        - name: wait-for-mongodb
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mongodb ${MONGO_PORT}; do echo waiting for mongodb; sleep 2; done"]
        # Затем ждём Kafka, потому что бот поднимает producer/consumer на старте.
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka ${KAFKA_INTERNAL_PORT}; do echo waiting for kafka; sleep 2; done"]
        # И только после этого проверяем, что секреты уже лежат в Vault.
        - name: wait-for-vault-secrets
          image: hashicorp/vault:1.15
          env:
            - name: VAULT_ADDR
              value: http://vault:${VAULT_PORT}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bot-secrets
                  key: VAULT_TOKEN
          command:
            - sh
            - -c
            - |
              # Бот читает секреты из Vault при инициализации Spring-контекста,
              # поэтому запускаем основной контейнер только когда путь уже существует.
              until vault kv get secret/crypto-bot >/dev/null 2>&1; do
                echo waiting for vault secrets
                sleep 2
              done
      containers:
        - name: crypto-bot
          image: ${DOCKER_IMAGE}
          imagePullPolicy: Always
          envFrom:
            # Обычные настройки и секреты собираются deploy-скриптом из .env
            # и затем прокидываются в контейнер как ConfigMap + Secret.
            - configMapRef:
                name: crypto-bot-config
            - secretRef:
                name: bot-secrets
          ports:
            - containerPort: ${SERVER_PORT}
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: ${SERVER_PORT}
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: ${SERVER_PORT}
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ${K8S_SERVICE_NAME}
spec:
  # NodePort, чтобы можно было быстро проверить HTTP endpoint.
  type: NodePort
  selector:
    app: ${K8S_APP_NAME}
  ports:
    - name: http
      port: ${K8S_SERVICE_PORT}
      targetPort: ${SERVER_PORT}
